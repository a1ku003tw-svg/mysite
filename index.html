<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shenirite | Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 深橘紅背景設定 */
            --bg-color-top: #2d0b05; 
            --bg-color-bottom: #0f0402;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --button-hover: rgba(255, 255, 255, 0.12);
            --text-color: #ffffff;
            --accent-orange: #ffb380;
            --soft-glow: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            background-color: var(--bg-color-bottom);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景流動效果層 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 20%, var(--soft-glow) 0%, transparent 60%),
                linear-gradient(to bottom, var(--bg-color-top), var(--bg-color-bottom));
            background-size: cover;
            z-index: -2;
            animation: bgBreath 15s infinite alternate ease-in-out;
        }

        @keyframes bgBreath {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* 噪點摩沙質感層 */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3%3FfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3%3F/filter%3%3F%3Frect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3F/svg%3%3F");
            opacity: 0.07;
            pointer-events: none;
            z-index: -1;
            animation: noiseMove 0.3s infinite steps(2);
        }

        @keyframes noiseMove {
            0% { transform: translate(0,0); }
            50% { transform: translate(-1%, 1%); }
            100% { transform: translate(1%, -1%); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1.2s ease-out;
        }

        /* 更新頭像連結 */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255, 80, 0, 0.1);
            margin-bottom: 25px;
            transition: 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 2.3rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .bio {
            font-size: 0.85rem;
            margin-bottom: 40px;
            opacity: 0.8;
            letter-spacing: 2px;
            color: #d1c4c0;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 25px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .link-card i {
            font-size: 1.2rem;
            width: 30px;
            text-align: left;
        }

        .link-card span {
            flex: 1;
            text-align: center;
            margin-right: 30px;
            letter-spacing: 1.5px;
        }

        .link-card:hover {
            background: var(--button-hover);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .email-section {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .email-section a {
            color: var(--accent-orange);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 179, 128, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="container">
        <img src="https://i.pinimg.com/736x/88/54/25/885425268c170f3f21855e9664f33b3d.jpg" alt="Shenirite" class="profile-img">
        
        <h1>Shenirite</h1>
        <p class="bio">KPOP ． Visual Motion Edit ． Animation</p>

        <div class="links-wrapper">
            <a href="https://fori.io/shenirite" class="link-card" target="_blank">
                <i class="fa-solid fa-palette"></i>
                <span>Portfolio</span>
            </a>
            
            <a href="https://www.instagram.com/shnrtfx/" class="link-card" target="_blank">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>
            
            <a href="https://www.youtube.com/@sheniritevfx" class="link-card" target="_blank">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </a>
            
            <a href="https://www.tiktok.com/@shnrtfx?is_from_webapp=1&sender_device=pc" class="link-card" target="_blank">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </a>
        </div>

        <div class="email-section">
            <p style="margin-bottom: 8px;">Business Inquiries</p>
            <p><i class="fa-solid fa-envelope"></i> Gmail • <a href="mailto:a1ku003tw@gmail.com">a1ku003tw@gmail.com</a></p>
        </div>
    </div>

</body>
</html>
