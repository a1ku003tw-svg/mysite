<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shenirite | Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 沿用原本你喜歡的高清背景圖 */
            --bg-url: url('https://img.midjourney.com/fcaf8efc53b8991473152d5e794ba19b/0_1.png');
            --glass-bg: rgba(255, 255, 255, 0.05);
            --button-hover: rgba(255, 255, 255, 0.12);
            --text-color: #ffffff;
            --accent-white: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            background-color: #060a12;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 複合背景層：原圖 + 白色漸層 + 呼吸動效 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                /* 頂部與中心白色柔光漸層 */
                radial-gradient(circle at 50% 30%, var(--accent-white) 0%, transparent 60%),
                linear-gradient(to bottom, transparent, rgba(0,0,0,0.4)),
                var(--bg-url);
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: bgMove 20s infinite alternate ease-in-out;
        }

        @keyframes bgMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* 高質感動態噪點層 (摩沙感) */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3%3FfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3%3F/filter%3%3F%3Frect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3F/svg%3%3F");
            opacity: 0.07;
            pointer-events: none;
            z-index: -1;
            animation: noiseAnim 0.2s infinite steps(2);
        }

        @keyframes noiseAnim {
            0% { transform: translate(0,0); }
            10% { transform: translate(-1%,-1%); }
            20% { transform: translate(1%,1%); }
            30% { transform: translate(-2%,1%); }
            100% { transform: translate(1%,-1%); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 40px 0;
            animation: containerIn 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 頭像呼吸光暈 */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            margin-bottom: 25px;
            position: relative;
            transition: 0.5s;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 5px;
            margin-bottom: 12px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        .bio {
            font-size: 0.85rem;
            margin-bottom: 45px;
            opacity: 0.9;
            letter-spacing: 2px;
            color: #d1d9e6;
            text-transform: uppercase;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 25px;
            border-radius: 100px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card i {
            font-size: 1.2rem;
            width: 30px;
            text-align: left;
        }

        .link-card span {
            flex: 1;
            text-align: center;
            margin-right: 30px;
            letter-spacing: 2px;
        }

        .link-card:hover {
            background: var(--button-hover);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .email-section {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .email-section a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="container">
        <img src="https://i.pinimg.com/736x/fc/af/8e/fcaf8efc53b8991473152d5e794ba19b.jpg" alt="Shenirite" class="profile-img">
        
        <h1>Shenirite</h1>
        <p class="bio">KPOP ． Visual Motion Edit ． Animation</p>

        <div class="links-wrapper">
            <a href="https://fori.io/shenirite" class="link-card" target="_blank">
                <i class="fa-solid fa-palette"></i>
                <span>Portfolio</span>
            </a>
            
            <a href="https://www.instagram.com/shnrtfx/" class="link-card" target="_blank">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>
            
            <a href="https://www.youtube.com/@sheniritevfx" class="link-card" target="_blank">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </a>
            
            <a href="https://www.tiktok.com/@shnrtfx?is_from_webapp=1&sender_device=pc" class="link-card" target="_blank">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </a>
        </div>

        <div class="email-section">
            <p style="margin-bottom: 8px;">Business Inquiries</p>
            <p><i class="fa-solid fa-envelope" style="margin-right: 5px;"></i> Gmail • <a href="mailto:a1ku003tw@gmail.com">a1ku003tw@gmail.com</a></p>
        </div>
    </div>

</body>
</html>
