<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shenirite | Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 背景基礎色 (深橘紅) */
            --bg-color-top: #2a0a04; /* 極深橘紅 */
            --bg-color-bottom: #140502; /* 接近黑色的深橘 */
            
            /* 毛玻璃按鈕設定 */
            --glass-bg: rgba(255, 255, 255, 0.04);
            --button-hover: rgba(255, 255, 255, 0.1);
            
            /* 文字與強調色 */
            --text-color: #ffffff;
            --accent-orange: #ffb380; /* 淡橘色用於強調 */
            --soft-white: rgba(255, 255, 255, 0.12); /* 柔光漸層色 */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            background-color: var(--bg-color-bottom);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 複合背景層：深橘紅漸層 + 白色柔光 + 呼吸動效 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 25%, var(--soft-white) 0%, transparent 65%),
                linear-gradient(to bottom, var(--bg-color-top), var(--bg-color-bottom));
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: bgMove 22s infinite alternate ease-in-out;
        }

        @keyframes bgMove {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.06) translateY(-1%); }
        }

        /* 動態噪點層 (摩沙質感) */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3%3FfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3%3F/filter%3%3F%3Frect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3F/svg%3%3F");
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
            animation: noiseAnim 0.2s infinite steps(2);
        }

        @keyframes noiseAnim {
            0% { transform: translate(0,0); }
            15% { transform: translate(-1.5%,-1%); }
            30% { transform: translate(1.5%,1%); }
            100% { transform: translate(1.5%,-1.5%); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 50px 0;
            animation: containerIn 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 新頭像樣式 - 使用 Base64 內嵌圖片 */
        .profile-img {
            width: 145px;
            height: 145px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 35px rgba(255, 120, 80, 0.15); /* 微弱的橘紅色光暈 */
            margin-bottom: 25px;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .profile-img:hover {
            transform: scale(1.06);
            box-shadow: 0 0 45px rgba(255, 120, 80, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 5px;
            margin-bottom: 12px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.7);
        }

        .bio {
            font-size: 0.88rem;
            margin-bottom: 50px;
            opacity: 0.85;
            letter-spacing: 2.5px;
            color: #e0d0cc;
            text-transform: uppercase;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .link-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px 25px;
            border-radius: 100px;
            text-decoration: none;
            color: white;
            font-size: 0.98rem;
            display: flex;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card i {
            font-size: 1.25rem;
            width: 35px;
            text-align: left;
            opacity: 0.9;
        }

        .link-card span {
            flex: 1;
            text-align: center;
            margin-right: 35px;
            letter-spacing: 2px;
        }

        .link-card:hover {
            background: var(--button-hover);
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
        }

        .email-section {
            margin-top: 65px;
            font-size: 0.82rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .email-section a {
            color: var(--accent-orange);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 179, 128, 0.2);
            transition: all 0.3s ease;
        }
        
        .email-section a:hover {
            border-bottom: 1px solid rgba(255, 179, 128, 0.7);
            opacity: 1;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
